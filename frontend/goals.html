<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Goals - FocusFlow</title>
  <link rel="stylesheet" href="css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script type="importmap">
    {
      "imports": {
        "firebase/app": "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js",
        "firebase/auth": "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js",
        "firebase/compat/app": "https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js",
        "firebase/compat/firestore": "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"
      }
    }
  </script>
  <style>
    .layout-wrapper { display: flex; min-height: 100vh; }
    /* Reusing Sidebar CSS */
    .sidebar { width: 250px; padding: 20px 0; display: flex; flex-direction: column; position: fixed; top: 0; bottom: 0; left: 0; z-index: 100; border-right: 1px solid var(--glass-border); }
    .sidebar-header { padding: 0 20px 20px; margin-bottom: 20px; border-bottom: 1px solid var(--glass-border); }
    .sidebar-nav { flex: 1; display: flex; flex-direction: column; gap: 5px; padding: 0 10px; }
    .nav-item { display: flex; align-items: center; gap: 12px; padding: 12px 20px; color: var(--text-secondary); text-decoration: none; border-radius: 8px; transition: all 0.3s ease; font-weight: 500; }
    .nav-item:hover, .nav-item.active { background: rgba(255, 255, 255, 0.1); color: var(--text-primary); }
    :root[data-theme="light"] .nav-item:hover, :root[data-theme="light"] .nav-item.active { background: rgba(0, 0, 0, 0.05); }
    .nav-item.active { border-left: 4px solid var(--accent-color); }
    
    .main-content { flex: 1; margin-left: 250px; padding: 20px 40px; display: flex; flex-direction: column; gap: 30px; }
    .topbar { display: flex; justify-content: space-between; align-items: center; padding-bottom: 20px; border-bottom: 1px solid var(--glass-border); }
    
    /* Goals specific */
    .goals-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; }
    .goal-card { position: relative; overflow: hidden; }
    .goal-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 16px; }
    .goal-title { font-size: 1.2rem; font-weight: 600; margin-bottom: 4px; }
    .goal-desc { color: var(--text-secondary); font-size: 0.9rem; }
    
    .progress-bar-container { width: 100%; height: 8px; background: var(--glass-border); border-radius: 4px; overflow: hidden; margin-top: 20px; }
    .progress-bar { height: 100%; background: var(--accent-gradient); border-radius: 4px; transition: width 0.5s ease; }
    
    .milestones { margin-top: 20px; list-style: none; padding: 0; }
    .milestone-item { display: flex; align-items: center; gap: 10px; padding: 8px 0; border-bottom: 1px dashed var(--glass-border); }
    .milestone-item:last-child { border-bottom: none; }
    .milestone-checkbox { width: 18px; height: 18px; border-radius: 50%; border: 2px solid var(--text-secondary); display: inline-block; }
    .milestone-item.done .milestone-checkbox { background: var(--success); border-color: var(--success); }
    .milestone-item.done span { opacity: 0.7; color: var(--text-secondary); }
    
    .achievements-section { margin-top: 20px; }
    .badges-flex { display: flex; gap: 16px; flex-wrap: wrap; }
    .badge-card { text-align: center; width: 100px; padding: 16px; border-radius: 12px; background: var(--glass-bg); border: 1px solid var(--glass-border); }
    .badge-icon { font-size: 2.5rem; margin-bottom: 8px; }
    .badge-name { font-size: 0.8rem; font-weight: 600; }
  </style>
</head>
<body class="theme-dark">
  <div class="layout-wrapper">
    <aside class="sidebar glass-panel">
      <div class="sidebar-header logo">
        <span class="logo-icon">🌊</span> FocusFlow
      </div>
      <nav class="sidebar-nav">
        <a href="dashboard.html" class="nav-item">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"></rect><rect x="14" y="3" width="7" height="7"></rect><rect x="14" y="14" width="7" height="7"></rect><rect x="3" y="14" width="7" height="7"></rect></svg>
          Dashboard
        </a>
        <a href="tasks.html" class="nav-item">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg>
          Tasks
        </a>
        <a href="timetable.html" class="nav-item">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>
          Timetable
        </a>
        <a href="analytics.html" class="nav-item">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="20" x2="18" y2="10"></line><line x1="12" y1="20" x2="12" y2="4"></line><line x1="6" y1="20" x2="6" y2="14"></line></svg>
          Analytics
        </a>
        <a href="goals.html" class="nav-item active">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><circle cx="12" cy="12" r="6"></circle><circle cx="12" cy="12" r="2"></circle></svg>
          Goals
        </a>
        <a href="settings.html" class="nav-item">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-2 2 2 2 0 01-2-2v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83 0 2 2 0 010-2.83l.06-.06a1.65 1.65 0 00.33-1.82 1.65 1.65 0 00-1.51-1H3a2 2 0 01-2-2 2 2 0 012-2h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 010-2.83 2 2 0 012.83 0l.06.06a1.65 1.65 0 001.82.33H9a1.65 1.65 0 001-1.51V3a2 2 0 012-2 2 2 0 012 2v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 0 2 2 0 010 2.83l-.06.06a1.65 1.65 0 00-.33 1.82V9a1.65 1.65 0 001.51 1H21a2 2 0 012 2 2 2 0 01-2 2h-.09a1.65 1.65 0 00-1.51 1z"></path></svg>
          Settings
        </a>
        <a href="#" id="logout-btn" class="nav-item text-danger" style="margin-top: auto;">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
          Logout
        </a>
      </nav>
    </aside>

    <main class="main-content">
      <header class="topbar">
        <div>
          <h2>Goals & Achievements 🎯</h2>
          <p class="text-secondary">Set milestones and track your long-term success.</p>
        </div>
        <div style="display:flex; gap:16px;">
          <button class="btn-primary">+ New Goal</button>
          <button id="theme-toggle" class="btn-icon">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"></path></svg>
          </button>
        </div>
      </header>

      <div class="goals-grid" id="goals-list">
        <!-- Rendered by goals.js -->
      </div>

      <div class="achievements-section animate-up delay-2">
        <h3 style="margin-bottom: 20px;">Your Badges</h3>
        <div class="badges-flex">
          <div class="badge-card">
            <div class="badge-icon">🔥</div>
            <div class="badge-name">7 Day Streak</div>
          </div>
          <div class="badge-card">
            <div class="badge-icon">📚</div>
            <div class="badge-name">Bookworm</div>
          </div>
          <div class="badge-card">
            <div class="badge-icon">⭐</div>
            <div class="badge-name">Perfect Week</div>
          </div>
          <div class="badge-card" style="opacity: 0.5;">
            <div class="badge-icon">🏆</div>
            <div class="badge-name">Month MVP</div>
            <div style="font-size:0.7rem; margin-top:5px;">Locked</div>
          </div>
        </div>
      </div>
    </main>
  </div>

  <!-- Add Goal Modal -->
  <div class="modal-overlay" id="goal-modal" style="display:none; position:fixed; top:0; left:0; right:0; bottom:0; background:rgba(0,0,0,0.5); backdrop-filter:blur(4px); align-items:center; justify-content:center; z-index:1000;">
    <div class="glass-card modal" style="width:100%; max-width:400px;">
      <h3 style="margin-bottom: 20px;">Add New Goal</h3>
      <form id="goal-form">
        <div style="margin-bottom: 16px;">
          <label style="display:block; margin-bottom:8px;">Goal Title</label>
          <input type="text" id="goal-title" style="width:100%; padding:10px; background:rgba(0,0,0,0.1); border:1px solid var(--glass-border); color:inherit; border-radius:8px;" required placeholder="e.g. Learn React">
        </div>
        <div style="margin-bottom: 16px;">
          <label style="display:block; margin-bottom:8px;">Target Date</label>
          <input type="date" id="goal-target" style="width:100%; padding:10px; background:rgba(0,0,0,0.1); border:1px solid var(--glass-border); color:inherit; border-radius:8px;" required>
        </div>
        <div style="margin-bottom: 16px;">
          <label style="display:block; margin-bottom:8px;">Milestones (comma-separated)</label>
          <input type="text" id="goal-milestones" style="width:100%; padding:10px; background:rgba(0,0,0,0.1); border:1px solid var(--glass-border); color:inherit; border-radius:8px;" required placeholder="e.g. Read docs, Build app, Deploy">
        </div>
        <div style="display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px;">
          <button type="button" id="close-goal-modal" class="btn-outline">Cancel</button>
          <button type="submit" class="btn-primary">Add Goal</button>
        </div>
      </form>
    </div>
  </div>

    <!-- Firebase SDK (Compat version) -->
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
  <!-- Firebase Modular Auth -->
  <script type="module" src="js/firebase.js"></script>
  
  <script src="js/store.js"></script>
  <script src="js/main.js"></script>
  <script src="js/goals.js"></script>
</body>
</html>
